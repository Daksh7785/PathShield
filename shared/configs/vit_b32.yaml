model:
  backbone: "vit_base_patch32_384"
  pretrained: true
  num_classes: 1
  decoder_channels: [384, 256, 128, 64, 32]

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  early_stopping_patience: 5
  
  loss_weights:
    dice: 0.4
    iou: 0.3
    boundary: 0.2
    connectivity: 0.1

  optimizer: "adamw"
  scheduler: "cosine_annealing_warm_restarts"
  scheduler_t0: 10

data:
  tile_size: 256
  overlap: 0.5
  normalization_mean: [0.485, 0.456, 0.406]
  normalization_std: [0.229, 0.224, 0.225]
  occlusion_probability: 0.7

inference:
  batch_size: 32
  threshold: 0.5
  crf_enabled: true
